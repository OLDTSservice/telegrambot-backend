services:
  - type: web
    name: tg-admin-backend
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: bash build.sh && python -c "from main import app; print('Import OK')"
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT --log-level debug
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
